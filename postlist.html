<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Ім'я Дитини | Проєкт "Назва"</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="logo">
        <a href="postlist.html"> 
        <img src="img/logo.png" alt="Логотип" class="logo-img">
        <span class="logo-text">FamilyFinder</span>
        </a>   
        </div>
        <div class="user-miniprofile">
            <a href="userprofile.html">
            <img src="img/user-avatar.jpg" alt="Профіль" class="user-avatar">
            <span class="user-name">Ім'я Користувача</span>
            </a>
        </div>
    </header>
    <div class="skip-box"></div>

        <div class="main-search-bar">
            <input type="text" placeholder="Пошук дитини за ім'ям ">
            <button class="search-icon-btn">🔍</button>
        </div>

    <div class="profile-container">         
    
    <aside class="sidebar-info">
        <article class="kid-bio">
            <h3>Параметри пошуку</h3>
            <form class="filters-form">
                <div class="filter-group">
                    <label for="region">Область</label>
                    <select id="region">
                        <option value="kharkiv">Харківська</option>
                        <option value="kyiv">Київська</option>
                        <option value="lviv">Львівська</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="city">Місто</label>
                    <input type="text" id="city" placeholder="Наприклад: Харків">
                </div>

                <div class="filter-group">
                    <label>Вік дитини</label>
                    <div class="age-inputs">
                    <input type="range" min="0" max="17" value="1" style="width: 80%;">
                    
                </div>

                <button type="submit" class="btn-search-apply">Застосувати</button>
            </form>
        </article>
    </aside>

    <main class="content-feed">
        
        <article class="post-kid">
           <section class="post-media">
                    <img src="img/event1.jpg" alt="Подія">
                </section>
                <section class="post-caption">
                    <p>Сьогодні ми вчилися малювати... (Підпис поста)</p>
                </section>
                </div>
        </article>
        
    </main>

</div>

    <footer class="main-footer">
        <p>&copy;2026 Svyatoslav. Зроблено з кодом та душею.</p>
        <div class="socials">
            <a href="#">LinkedIn</a>
            <a href="#">GitHub</a>
        </div>
    </footer>

</body>
</html>
